career-profile:
    title: Research Interests
    summary: |
      <p><b>Mobility Service</b>: Developing the real-time operation strategy of mobility services (such as car-sharing, bike-sharing, and ridesharing) in uncertain and dynamic conditions</p>
      <p><b>Network Modeling</b>: Developing the solution technique to improve efficiency and resilience of transportation networks (such as public transit, infrastructure, and logistics) in uncertain and unpredictable conditions</p>
      <p><b>User Behavior</b>: Identifying characteristics of transportation user’s behavior (such as shortest path algorithm, mode choice, and driving behavior)</p>

