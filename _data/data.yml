research_experiences:
    - role: Researcher
      time: 2018 - Present
      company: Institute of Construction and Environmental Engineering, Seoul National University
      details: |
        <p>Lead a study on developing optimal operation strategy of Mobility-as-a-Service (MaaS) for the mobility impaired</p>
        <p>Design a behavioral choice model of the use of a shared parking and shared mobility services</p>
        <p>Collaborate and coordinate with faculty, businessman, researchers, fellow graduate students
        for preparing project proposals across institutes (University of Seoul, Radius Corporation, Korea Land & Housing Institute)</p>

#          - Bullet point

    - role: Graduate Research Assistant
      time: 2016 - 2018
      company: Department of Civil and Environmental Engineering, Seoul National University
      details: |
        <p>Designed real-time based relocation strategy for car-sharing and developed event-based simulation for car-sharing system</p>
        <p>Led a study on improving dial-a-rid service for the disabled with shared mobility in Seoul and a study on
        developing evaluation method to evaluate driver behavior with surrogate safety measures</p>
        <p>Collaborated and coordinated with faculty, businessman, researchers across institutes
        (Korea Transport Institute, Korea Transportation Safety Authority, InnoSim)</p>

